<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Customer Support — Request text support">
  <title>Get Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ========== MAIN SCREEN ========== -->
  <div id="screen-home" class="screen active">
    <div class="home-container">
      <div class="brand">
        <div class="brand-icon">
          <span class="material-icons-round">support_agent</span>
        </div>
        <h1>Need Help?</h1>
        <p class="brand-sub">Message our support team for assistance</p>
        <p class="site-label" id="site-name-label">Remote Site</p>
      </div>

      <div class="support-buttons">
        <button id="btn-text-support" class="support-btn text-support">
          <div class="btn-glow text-glow"></div>
          <div class="btn-icon-wrap">
            <span class="material-icons-round">chat</span>
          </div>
          <div class="btn-content">
            <span class="btn-title">Text Support</span>
            <span class="btn-desc">Chat with a support agent</span>
          </div>
          <span class="material-icons-round btn-arrow">arrow_forward</span>
        </button>
      </div>

      <div class="status-bar">
        <div id="home-connection" class="status-pill disconnected">
          <span class="status-dot"></span>
          <span>Connecting…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== TEXT CHAT SCREEN ========== -->
  <div id="screen-chat" class="screen">
    <div class="screen-header">
      <button id="btn-chat-back" class="btn-back">
        <span class="material-icons-round">arrow_back</span>
      </button>
      <div class="header-info">
        <h2>Text Support</h2>
        <span id="chat-status" class="status-text">Connecting…</span>
      </div>
      <div id="chat-connection-dot" class="status-dot-sm disconnected"></div>
    </div>

    <div id="chat-messages" class="scrollable"></div>

    <div id="initial-message-area">
      <p class="initial-prompt">Describe your issue to get started:</p>
      <textarea id="initial-message" rows="3" placeholder="Type your message here…"></textarea>
      <button id="btn-send-initial" class="btn btn-primary btn-full">
        <span class="material-icons-round">send</span>
        Send & Connect
      </button>
    </div>

    <div id="chat-input-area" class="hidden">
      <input type="text" id="chat-input" placeholder="Type a message…" autocomplete="off">
      <button id="btn-send-chat" class="btn btn-primary">
        <span class="material-icons-round">send</span>
      </button>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
